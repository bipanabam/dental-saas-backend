services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    image: dental-saas-api:v1

    restart: unless-stopped

    env_file:
      - .env.prod
    ports:
      - "8081:8000" 
    command: >
      gunicorn
      -k uvicorn.workers.UvicornWorker
      -w 4
      --timeout 120
      --forwarded-allow-ips="*"
      --bind 0.0.0.0:8000
      app.main:app

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3