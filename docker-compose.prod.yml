services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    image: dental-saas-api:v1

    restart: unless-stopped

    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3